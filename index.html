<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Piece Designer - Efficient</title>
  <style>
    :root{
      --bg:#f5efe5;--panel:#fffaf2;--line:#d4c3a7;--text:#2f241a;--muted:#6f6255;
      --accent:#a54c00;--danger:#b42318;--piece-fill:#dac09b;--rail:#4b2a17;
      --edge:#111;--centre:#f4b35e;--shadow:0 10px 24px rgba(46,31,18,.12);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:var(--bg)}
    .app{display:grid;grid-template-columns:minmax(0,1fr);height:100vh;overflow:hidden}
    
    .workspace{position:relative;min-width:0;overflow:hidden;background:linear-gradient(180deg,#f8f3eb 0%,#f2eadf 100%)}
    .workspace.panning svg{cursor:grabbing}
    .preset-strip{position:absolute;left:14px;right:14px;top:14px;z-index:20;background:rgba(255,250,242,.94);backdrop-filter:blur(10px);border:1px solid rgba(0,0,0,.08);border-radius:16px;box-shadow:var(--shadow);padding:8px;max-height:208px;overflow-y:auto;overflow-x:hidden;scrollbar-gutter:stable}
    .preset-strip:focus-within{box-shadow:0 0 0 2px rgba(165,76,0,.12),var(--shadow)}
    .preset-buttons{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:94px;gap:6px;width:100%;align-content:start;padding-right:4px}
    .preset-card{width:100%;min-width:0;height:94px;background:#fffaf2;border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:6px 5px;display:grid;grid-template-rows:32px 1fr;gap:6px;box-shadow:0 4px 12px rgba(46,31,18,.08);align-content:start;cursor:pointer}
    .preset-card.drag-origin{opacity:.55}
    .preset-drag-ghost{position:fixed;left:0;top:0;z-index:60;width:160px;max-width:22vw;pointer-events:none;transform:translate(-9999px,-9999px) rotate(2deg);opacity:.96;box-shadow:0 16px 30px rgba(46,31,18,.18)}
    .preset-drag-ghost.can-drop{box-shadow:0 0 0 2px rgba(165,76,0,.18),0 16px 30px rgba(46,31,18,.18)}
    .trash-drop{position:absolute;left:14px;bottom:14px;z-index:18;width:94px;height:94px;display:flex;align-items:center;justify-content:center;padding:0;background:rgba(255,250,242,.94);backdrop-filter:blur(10px);border:1px solid rgba(0,0,0,.09);border-radius:12px;box-shadow:0 4px 12px rgba(46,31,18,.08);pointer-events:none;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease,background .12s ease,opacity .12s ease;opacity:.9}
    .trash-drop svg{width:38px;height:38px;display:block;overflow:visible}
    .trash-drop.active{background:rgba(180,35,24,.12);border-color:rgba(180,35,24,.45);box-shadow:0 0 0 2px rgba(180,35,24,.14),0 4px 12px rgba(46,31,18,.08);transform:scale(1.03);opacity:1}
    .preset-card.active{border-color:rgba(165,76,0,.45);box-shadow:0 0 0 2px rgba(165,76,0,.12),0 4px 12px rgba(46,31,18,.08)}
    .preset-thumb-wrap{position:relative;width:100%;height:30px;border-radius:10px;background:linear-gradient(180deg,#fbf5eb 0%,#f2e8d7 100%);border:1px solid rgba(0,0,0,.05);overflow:hidden}
    .preset-thumb{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:10px;background:none;border:none}
    .preset-thumb-marker{position:absolute;top:50%;transform:translateY(-50%);z-index:2;font-size:12px;font-weight:900;line-height:1;color:#111;pointer-events:none;text-shadow:0 0 2px rgba(255,250,242,.98),0 0 4px rgba(255,250,242,.98)}
    .preset-thumb-marker.start{left:6px}
    .preset-thumb-marker.end{right:6px}
    .preset-code{display:none}
    .preset-meta{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.02;color:var(--text);letter-spacing:.01em;gap:2px}
    .preset-kind{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.02em}
    .preset-name{font-size:11px;font-weight:400;color:var(--muted);letter-spacing:.02em}

    .empty{padding:14px;border:1px dashed rgba(0,0,0,.16);border-radius:14px;color:var(--muted);background:rgba(255,255,255,.55);font-size:14px;line-height:1.45}
    .spec-card{border:1px solid rgba(0,0,0,.09);background:var(--panel);border-radius:16px;box-shadow:0 8px 18px rgba(46,31,18,.08);margin-bottom:12px;overflow:hidden}
    .spec-header{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px;align-items:center}
    .spec-name{font-weight:800;font-size:15px;line-height:1.25}
    .spec-meta{color:var(--muted);font-size:12px;margin-top:3px}
    .spec-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .icon-btn,.mini-btn{padding:8px 10px;border:none;border-radius:10px;font-size:13px;font-weight:700;line-height:1;cursor:pointer}
    .icon-btn{min-width:36px;background:#efe2d2;color:var(--text)}
    .icon-btn .arrow{display:inline-block;transition:transform .16s ease}
    .icon-btn.expanded .arrow{transform:rotate(180deg)}
    .mini-btn{background:#ead4bc;color:var(--text)}
    .piece-list{border-top:1px solid rgba(0,0,0,.06);padding:10px 12px 12px;display:none}
    .piece-list.expanded{display:block}
    .piece-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);border-radius:10px}
    .piece-row.active{background:rgba(165,76,0,.10)}
    .piece-row:last-child{border-bottom:none;padding-bottom:2px}
    .piece-label{min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .piece-toggle{width:18px;height:18px;cursor:pointer}
    .delete-btn{border:none;width:30px;height:30px;border-radius:999px;background:rgba(180,35,24,.1);color:var(--danger);font-size:18px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
    .delete-btn:hover{background:rgba(180,35,24,.18)}
    button{font:inherit}
    svg{width:100%;height:100%;display:block;touch-action:none;user-select:none;cursor:grab}
    #panSurface{cursor:grab}
    .workspace.panning #panSurface{cursor:grabbing}
    .piece,.piece-overlay{pointer-events:none}
    .piece *,.piece-overlay *{pointer-events:none}
    .piece .hit,.piece-overlay .hit{pointer-events:all;cursor:grab}
    .piece.is-active,.piece-overlay.is-active{filter:drop-shadow(0 0 .9px rgba(165,76,0,.9))}
    .piece.dragging .hit,.piece-overlay.dragging .hit{cursor:grabbing}
    @media (max-width:980px){
      .app{grid-template-columns:1fr;height:100vh}
      
      .workspace{border-right:none;border-bottom:none}
      .preset-strip{left:10px;right:10px;top:10px;max-height:208px}
      .trash-drop{left:10px;bottom:10px}
      .preset-buttons{grid-template-columns:repeat(4,minmax(0,1fr));grid-auto-rows:94px}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <section class="workspace">
      <svg id="canvas" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-label="Track design canvas">
        <defs>
          <filter id="woodTextureFilter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.014 0.18" numOctaves="2" seed="7" stitchTiles="stitch" result="noise"></feTurbulence>
            <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.31  0 0 0 0 0.20  0 0 0 0 0.12  0 0 0 0.62 0" result="grain"></feColorMatrix>
            <feComposite in="grain" in2="SourceAlpha" operator="in"></feComposite>
          </filter>
          <filter id="woodTextureHighlightFilter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.006 0.055" numOctaves="1" seed="19" stitchTiles="stitch" result="noise"></feTurbulence>
            <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.94  0 0 0 0 0.83  0 0 0 0 0.67  0 0 0 0.28 0" result="highlight"></feColorMatrix>
            <feComposite in="highlight" in2="SourceAlpha" operator="in"></feComposite>
          </filter>
        </defs>
        <g id="uiUnderlayLayer"><rect id="panSurface" x="0" y="0" width="1200" height="800" fill="rgba(0,0,0,0.001)" pointer-events="all"></rect></g>
        <g id="worldLayer">
          <g id="pieceLayer"></g>
          <g id="trackOverlayLayer"></g>
          <g id="fxLayer"></g>
        </g>
      </svg>
      <div id="trashOverlay" class="trash-drop" aria-hidden="true"></div>
      <div class="preset-strip">
        <div id="presetButtons" class="preset-buttons" aria-label="Parts buttons"></div>
      </div>
    </section>
  </div>

  <script>
  (() => {
    'use strict';

    const PRESETS = [
      { code:'A2', centreLength:54.0,  radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'female', displayName:'X SHORT',     notes:'X SHORT' },
      { code:'B2', centreLength:54.0,  radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'male',   displayName:'X SHORT',     notes:'X SHORT' },
      { code:'C2', centreLength:54.0,  radiusValue:null, angleDeg:0, startConnector:'female', endConnector:'female', displayName:'X SHORT',     notes:'X SHORT' },
      { code:'A1', centreLength:108.0, radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'female', displayName:'SHORT',       notes:'SHORT' },
      { code:'B1', centreLength:108.0, radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'male',   displayName:'SHORT',       notes:'SHORT' },
      { code:'C1', centreLength:108.0, radiusValue:null, angleDeg:0, startConnector:'female', endConnector:'female', displayName:'SHORT',       notes:'SHORT' },
      { code:'A',  centreLength:144.0, radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'female', displayName:'MEDIUM',      notes:'MEDIUM' },
      { code:'B',  centreLength:144.0, radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'male',   displayName:'MEDIUM',      notes:'MEDIUM' },
      { code:'C',  centreLength:144.0, radiusValue:null, angleDeg:0, startConnector:'female', endConnector:'female', displayName:'MEDIUM',      notes:'MEDIUM' },
      { code:'D',  centreLength:216.0, radiusValue:null, angleDeg:0, startConnector:'male',   endConnector:'female', displayName:'LONG',        notes:'LONG' },
      { code:'E1', centreLength:86.4,  radiusValue:110,  angleDeg:(86.4/110) * 180 / Math.PI,  startConnector:'male', endConnector:'female', displayName:'SMALL', notes:'SMALL' },
      { code:'E',  centreLength:158.7, radiusValue:202,  angleDeg:(158.7/202) * 180 / Math.PI, startConnector:'male', endConnector:'female', displayName:'LARGE', notes:'LARGE' },
      { code:'X',   compositeKind:'crossA1',  centreLength:108.0, radiusValue:null, angleDeg:0, startConnector:'male', endConnector:'female', displayName:'CROSS',  notes:'CROSS' },
      { code:'T31', compositeKind:'triple31', centreLength:144.0, radiusValue:null, angleDeg:0, startConnector:'male', endConnector:'female', startMarkerCount:3, endMarkerCount:1, displayName:'3-to-1', notes:'3-to-1' },
      { code:'T13', compositeKind:'triple13', centreLength:144.0, radiusValue:null, angleDeg:0, startConnector:'male', endConnector:'female', startMarkerCount:1, endMarkerCount:3, displayName:'1-to-3', notes:'1-to-3' }
    ];

    const PRESET_INDEX = new Map(PRESETS.map((preset, index) => [preset.code, index]));

    const CONFIG = {
      railOffset: 13,
      railWidth: 6,
      outerOffset: 20,
      outerWidth: 0.5,
      connectorHeadRadius: 6.25,
      connectorNeckWidth: 6.2,
      connectorThroatWidth: 6.8,
      connectorDepth: 12,
      connectorClearance: 0.35,
      centreWidth: 1.4,
      newPieceOrigin: { x: 360, y: 370 },
      spawnStep: { x: 22, y: 18 },
      snapDistance: 22,
      connectionEpsilon: 0.75,
      alignmentToleranceDeg: 2,
      dualSnapMaxResidual: 8,
      seriesRelaxDistance: 12,
      seriesRelaxIterations: 18,
      seriesRelaxStep: 0.6,
      seriesRelaxMaxPerPass: 3
    };

    const dom = {
      app: document.getElementById('app'),
      svg: document.getElementById('canvas'),
      panSurface: document.getElementById('panSurface'),
      workspace: document.querySelector('.workspace'),
      presetStrip: document.querySelector('.preset-strip'),
      trashOverlay: document.getElementById('trashOverlay'),
      worldLayer: document.getElementById('worldLayer'),
      uiUnderlayLayer: document.getElementById('uiUnderlayLayer'),
      pieceLayer: document.getElementById('pieceLayer'),
      trackOverlayLayer: document.getElementById('trackOverlayLayer'),
      fxLayer: document.getElementById('fxLayer'),
      legend: document.getElementById('legend'),
      presetButtons: document.getElementById('presetButtons'),
      sidebarToggle: document.getElementById('sidebarToggle')
    };

    const state = {
      pieceCounter: 0,
      activePieceId: null,
      activePresetCode: null,
      pendingClick: null,
      drag: null,
      pieces: new Map(),
      pieceTypes: new Map(),
      geomCache: new Map(),
      thumbCache: new Map(),
      thumbFrame: null,
      warningsQueued: false,
      dragOverTrash: false,
      panDrag: null,
      libraryDrag: null,
      suppressPresetClickUntil: 0,
      view: { panX: 0, panY: 0, zoom: 1, minZoom: 0.35, maxZoom: 4 },
      trashBounds: { x: 14, y: 692, width: 94, height: 94 }
    };

    const fmt = value => Number(value).toFixed(2).replace(/\.00$/, '');
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const roundKey = value => Number(value).toFixed(4);
    const degToRad = deg => deg * Math.PI / 180;
    const pieceValues = () => [...state.pieces.values()];

    function connectorIcon(connectorKind) {
      return connectorKind === 'female' ? '○' : '●';
    }

    function connectorCode(startConnector, endConnector) {
      return `${connectorIcon(startConnector)} ${connectorIcon(endConnector)}`;
    }

    function presetForCode(code) {
      return PRESETS.find(preset => preset.code === code) || null;
    }

    function presetDisplayName(presetOrType) {
      const preset = presetOrType?.code ? presetForCode(presetOrType.code) : presetForCode(presetOrType?.presetCode);
      return preset?.displayName || presetOrType?.displayName || presetOrType?.notes || presetOrType?.presetCode || '';
    }

    function presetFamilyLabel(presetOrType) {
      const code = presetOrType?.code || presetOrType?.presetCode || '';
      if (code === 'X') return 'EXTRA';
      if (presetOrType?.compositeKind) return 'EXTRA';
      if (presetOrType?.radiusValue != null) return 'CURVE';
      return 'STRAIGHT';
    }

    function decoratedPresetCode(presetOrType) {
      const code = presetOrType?.code || presetOrType?.presetCode || '';
      if (!code) return '';
      if (code === 'X') return code;
      return `${connectorIcon(presetOrType.startConnector)} ${code} ${connectorIcon(presetOrType.endConnector)}`;
    }

    function presetButtonLabel(preset) {
      const decoratedCode = decoratedPresetCode(preset);
      const displayName = presetDisplayName(preset);
      return decoratedCode ? `${decoratedCode} - ${displayName}` : `${preset.code} - ${displayName}`;
    }

    function presetThumbMarkersMarkup(preset) {
      if (!preset || preset.code === 'X') return '';
      const markerPositions = count => count <= 1 ? [50] : [24, 50, 76];
      const sideMarkup = (side, connectorKind, count) => markerPositions(count).map(top =>
        `<span class="preset-thumb-marker ${side}" style="top:${top}%" aria-hidden="true">${connectorIcon(connectorKind)}</span>`
      ).join('');
      const startCount = Math.max(1, Number(preset.startMarkerCount || 1));
      const endCount = Math.max(1, Number(preset.endMarkerCount || 1));
      return sideMarkup('start', preset.startConnector, startCount) + sideMarkup('end', preset.endConnector, endCount);
    }

    function presetThumbWrapMarkup(preset) {
      return `<div class="preset-thumb-wrap">${presetThumbMarkersMarkup(preset)}${getThumbSvgMarkup(preset)}</div>`;
    }

    function radiusModeForValue(radiusValue) {
      return radiusValue == null ? 'Straight' : `R${fmt(radiusValue)}`;
    }

    function buildSpec({ centreLength, angleDeg, radiusValue, startConnector='male', endConnector='female', presetCode=null, notes='', compositeKind=null }) {
      const isStraight = compositeKind ? true : (Math.abs(angleDeg) < 1e-9 || radiusValue == null);
      return {
        isStraight,
        centreLength,
        angleDeg: isStraight ? 0 : angleDeg,
        radiusValue: isStraight ? null : radiusValue,
        radiusMode: compositeKind ? 'Composite' : (isStraight ? 'Straight' : radiusModeForValue(radiusValue)),
        startConnector,
        endConnector,
        presetCode,
        notes,
        compositeKind
      };
    }

    function presetToSpec(preset) {
      return buildSpec(preset);
    }

    function specKey(spec) {
      if (spec.compositeKind) {
        return `composite|${spec.compositeKind}|${spec.presetCode || ''}`;
      }
      const connectorPart = `${spec.startConnector}|${spec.endConnector}`;
      return spec.isStraight
        ? `straight|${roundKey(spec.centreLength)}|${connectorPart}|${spec.presetCode || ''}`
        : `curve|${roundKey(spec.radiusValue)}|${roundKey(spec.angleDeg)}|${connectorPart}|${spec.presetCode || ''}`;
    }

    function getGeometryBySpec(spec) {
      const key = spec.key || specKey(spec);
      if (!state.geomCache.has(key)) {
        let geometry;
        if (spec.compositeKind === 'crossA1') geometry = geometryForCrossA1Spec(spec);
        else if (spec.compositeKind === 'triple13' || spec.compositeKind === 'triple31') geometry = geometryForTripleBranchSpec(spec);
        else geometry = geometryForSpec(spec.centreLength, spec.angleDeg, spec.radiusValue, spec.startConnector, spec.endConnector);
        state.geomCache.set(key, geometry);
      }
      return state.geomCache.get(key);
    }

    function ensureType(spec) {
      const key = specKey(spec);
      let type = state.pieceTypes.get(key);
      if (!type) {
        type = { ...spec, key, pieces: [], expanded: false };
        state.pieceTypes.set(key, type);
      }
      return type;
    }

    function getTypeGeometry(type) {
      return getGeometryBySpec(type);
    }

    function svgPoint(clientX, clientY) {
      const pt = dom.svg.createSVGPoint();
      pt.x = clientX;
      pt.y = clientY;
      const out = pt.matrixTransform(dom.svg.getScreenCTM().inverse());
      return { x: out.x, y: out.y };
    }

    function rotatePoint(point, angleDeg) {
      const a = degToRad(angleDeg), c = Math.cos(a), s = Math.sin(a);
      return { x: point.x * c - point.y * s, y: point.x * s + point.y * c };
    }

    function pieceLocalPivot(piece) {
      return piece.rotationPivot || getTypeGeometry(piece.type).rotationPivot || { x: 0, y: 0 };
    }

    function worldConnectorPoint(piece, localPoint) {
      const pivot = pieceLocalPivot(piece);
      const rotated = rotatePoint({ x: localPoint.x - pivot.x, y: localPoint.y - pivot.y }, piece.rotation);
      return { x: piece.x + rotated.x, y: piece.y + rotated.y };
    }

    function normalizeVector(v) {
      const len = Math.hypot(v.x, v.y) || 1;
      return { x: v.x / len, y: v.y / len };
    }

    function worldDirection(piece, localDirection) {
      return normalizeVector(rotatePoint(localDirection, piece.rotation));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function areConnectorDirectionsAligned(aWorldDir, bWorldDir) {
      const dot = aWorldDir.x * bWorldDir.x + aWorldDir.y * bWorldDir.y;
      return dot <= -Math.cos(degToRad(CONFIG.alignmentToleranceDeg));
    }

    function pointOnPath(centreLength, angleDeg, radiusValue, s) {
      if (Math.abs(angleDeg) < 1e-9 || radiusValue == null) {
        return { p: { x: s, y: 0 }, t: { x: 1, y: 0 }, n: { x: 0, y: 1 } };
      }
      const theta = degToRad(angleDeg);
      const k = Math.sign(theta) / radiusValue;
      const a = k * s;
      return {
        p: { x: Math.sin(a) / k, y: (1 - Math.cos(a)) / k },
        t: { x: Math.cos(a), y: Math.sin(a) },
        n: { x: -Math.sin(a), y: Math.cos(a) }
      };
    }

    function samplePath(centreLength, angleDeg, radiusValue) {
      const steps = Math.max(24, Math.ceil(centreLength / 6), Math.ceil(Math.abs(angleDeg) / 5));
      const centre = new Array(steps + 1);
      const normals = new Array(steps + 1);
      for (let i = 0; i <= steps; i++) {
        const s = centreLength * (i / steps);
        const sample = pointOnPath(centreLength, angleDeg, radiusValue, s);
        centre[i] = sample.p;
        normals[i] = sample.n;
      }
      return { centre, normals };
    }

    function offsetPoints(points, normals, offset) {
      const out = new Array(points.length);
      for (let i = 0; i < points.length; i++) {
        out[i] = { x: points[i].x + normals[i].x * offset, y: points[i].y + normals[i].y * offset };
      }
      return out;
    }

    function polylineD(points) {
      let out = '';
      for (let i = 0; i < points.length; i++) out += `${i ? ' L ' : 'M '}${points[i].x.toFixed(3)} ${points[i].y.toFixed(3)}`;
      return out;
    }

    function polygonD(points) {
      return polylineD(points) + ' Z';
    }

    function reversedPolygonD(points) {
      return polylineD([...points].reverse()) + ' Z';
    }

    function circlePath(cx, cy, r, reverse=false) {
      const sweep = reverse ? 1 : 0;
      return `M ${(cx + r).toFixed(3)} ${cy.toFixed(3)} A ${r.toFixed(3)} ${r.toFixed(3)} 0 1 ${sweep} ${(cx - r).toFixed(3)} ${cy.toFixed(3)} A ${r.toFixed(3)} ${r.toFixed(3)} 0 1 ${sweep} ${(cx + r).toFixed(3)} ${cy.toFixed(3)} Z`;
    }

    function lineD(a, b) {
      return `M ${a.x.toFixed(3)} ${a.y.toFixed(3)} L ${b.x.toFixed(3)} ${b.y.toFixed(3)}`;
    }

    function orientedPoint(origin, tangent, normal, x, y) {
      return { x: origin.x + tangent.x * x + normal.x * y, y: origin.y + tangent.y * x + normal.y * y };
    }

    function orientedRectPoints(origin, tangent, normal, x0, x1, halfWidth) {
      return [
        orientedPoint(origin, tangent, normal, x0, -halfWidth),
        orientedPoint(origin, tangent, normal, x1, -halfWidth),
        orientedPoint(origin, tangent, normal, x1, halfWidth),
        orientedPoint(origin, tangent, normal, x0, halfWidth)
      ];
    }

    function boundsFromPoints(points) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      return { minX, minY, maxX, maxY };
    }

    function expandBoundsWithCircle(bounds, centre, radius) {
      bounds.minX = Math.min(bounds.minX, centre.x - radius);
      bounds.minY = Math.min(bounds.minY, centre.y - radius);
      bounds.maxX = Math.max(bounds.maxX, centre.x + radius);
      bounds.maxY = Math.max(bounds.maxY, centre.y + radius);
    }

    function connectorGeometryAtEnd(sample, side, kind) {
      const headRadius = CONFIG.connectorHeadRadius;
      const femaleRadius = headRadius + CONFIG.connectorClearance;
      const neckHalf = CONFIG.connectorNeckWidth / 2;
      const throatHalf = CONFIG.connectorThroatWidth / 2;
      const maleJoin = Math.sqrt(Math.max(0, headRadius * headRadius - neckHalf * neckHalf));
      const femaleJoin = Math.sqrt(Math.max(0, femaleRadius * femaleRadius - throatHalf * throatHalf));
      const maleNeckLength = Math.max(0, CONFIG.connectorDepth - maleJoin);
      const femaleThroatLength = Math.max(0, CONFIG.connectorDepth - femaleJoin);
      const outward = side === 'start' ? -1 : 1;
      const connectorCentre = kind === 'male'
        ? { x: sample.p.x + sample.t.x * (outward * CONFIG.connectorDepth), y: sample.p.y + sample.t.y * (outward * CONFIG.connectorDepth) }
        : { x: sample.p.x - sample.t.x * (outward * CONFIG.connectorDepth), y: sample.p.y - sample.t.y * (outward * CONFIG.connectorDepth) };

      if (kind === 'male') {
        const x0 = side === 'start' ? -maleNeckLength : 0;
        const x1 = side === 'start' ? 0 : maleNeckLength;
        const neckPoints = orientedRectPoints(sample.p, sample.t, sample.n, x0, x1, neckHalf);
        const shoulderTop = orientedPoint(sample.p, sample.t, sample.n, 0, neckHalf);
        const shoulderBottom = orientedPoint(sample.p, sample.t, sample.n, 0, -neckHalf);
        return {
          kind, side, centre: connectorCentre,
          direction: { x: sample.t.x * outward, y: sample.t.y * outward },
          fillPaths: [polygonD(neckPoints), circlePath(connectorCentre.x, connectorCentre.y, headRadius)],
          outlinePaths: [polygonD(neckPoints), circlePath(connectorCentre.x, connectorCentre.y, headRadius)],
          hitPaths: [polygonD(neckPoints), circlePath(connectorCentre.x, connectorCentre.y, headRadius)],
          shoulderD: `${lineD(sample.edgeTop, shoulderTop)} ${lineD(shoulderBottom, sample.edgeBottom)}`,
          capD: '', maskPaths: [], negativeFillPaths: [], boundsPoints: neckPoints, headRadius
        };
      }

      const x0 = side === 'start' ? 0 : -femaleThroatLength;
      const x1 = side === 'start' ? femaleThroatLength : 0;
      const throatPoints = orientedRectPoints(sample.p, sample.t, sample.n, x0, x1, throatHalf);
      return {
        kind, side, centre: connectorCentre,
        direction: { x: sample.t.x * outward, y: sample.t.y * outward },
        fillPaths: [], outlinePaths: [], hitPaths: [], shoulderD: '',
        capD: lineD(sample.edgeTop, sample.edgeBottom),
        maskPaths: [circlePath(connectorCentre.x, connectorCentre.y, femaleRadius), polygonD(throatPoints)],
        negativeFillPaths: [circlePath(connectorCentre.x, connectorCentre.y, femaleRadius, true), reversedPolygonD(throatPoints)],
        boundsPoints: [], headRadius: 0
      };
    }

    function geometryForSpec(centreLength, angleDeg, radiusValue, startConnector, endConnector) {
      const sampled = samplePath(centreLength, angleDeg, radiusValue);
      const centre = sampled.centre;
      const normals = sampled.normals;
      const railLeft = offsetPoints(centre, normals, CONFIG.railOffset);
      const railRight = offsetPoints(centre, normals, -CONFIG.railOffset);
      const edgeLeft = offsetPoints(centre, normals, CONFIG.outerOffset);
      const edgeRight = offsetPoints(centre, normals, -CONFIG.outerOffset);

      const startSample = pointOnPath(centreLength, angleDeg, radiusValue, 0);
      const endSample = pointOnPath(centreLength, angleDeg, radiusValue, centreLength);
      startSample.edgeTop = edgeLeft[0];
      startSample.edgeBottom = edgeRight[0];
      endSample.edgeTop = edgeLeft[edgeLeft.length - 1];
      endSample.edgeBottom = edgeRight[edgeRight.length - 1];

      const startGeom = connectorGeometryAtEnd(startSample, 'start', startConnector);
      const endGeom = connectorGeometryAtEnd(endSample, 'end', endConnector);

      const bodyOutline = edgeLeft.concat([...edgeRight].reverse());
      const thumbBounds = boundsFromPoints(bodyOutline);
      for (const connector of [startGeom, endGeom]) {
        for (const p of connector.boundsPoints) {
          thumbBounds.minX = Math.min(thumbBounds.minX, p.x);
          thumbBounds.minY = Math.min(thumbBounds.minY, p.y);
          thumbBounds.maxX = Math.max(thumbBounds.maxX, p.x);
          thumbBounds.maxY = Math.max(thumbBounds.maxY, p.y);
        }
        if (connector.kind === 'male' && connector.headRadius > 0) expandBoundsWithCircle(thumbBounds, connector.centre, connector.headRadius);
      }

      return {
        centreD: polylineD(centre),
        railLeftD: polylineD(railLeft),
        railRightD: polylineD(railRight),
        edgeLeftD: polylineD(edgeLeft),
        edgeRightD: polylineD(edgeRight),
        bodyPolygonD: polygonD(bodyOutline),
        hitPath: polygonD(bodyOutline),
        startGeom,
        endGeom,
        connectorPoints: [startGeom, endGeom].map(connector => ({ kind: connector.kind, local: connector.centre, direction: connector.direction, side: connector.side })),
        rotationPivot: pointOnPath(centreLength, angleDeg, radiusValue, centreLength / 2).p,
        thumbBounds
      };
    }

    function transformLocalPoint(point, tx=0, ty=0, rotationDeg=0) {
      const rotated = rotatePoint(point, rotationDeg);
      return { x: rotated.x + tx, y: rotated.y + ty };
    }

    function transformBounds(bounds, tx=0, ty=0, rotationDeg=0) {
      const corners = [
        { x: bounds.minX, y: bounds.minY },
        { x: bounds.maxX, y: bounds.minY },
        { x: bounds.maxX, y: bounds.maxY },
        { x: bounds.minX, y: bounds.maxY }
      ].map(point => transformLocalPoint(point, tx, ty, rotationDeg));
      return boundsFromPoints(corners);
    }

    function mergeBounds(boundsList) {
      const merged = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      for (const bounds of boundsList) {
        merged.minX = Math.min(merged.minX, bounds.minX);
        merged.minY = Math.min(merged.minY, bounds.minY);
        merged.maxX = Math.max(merged.maxX, bounds.maxX);
        merged.maxY = Math.max(merged.maxY, bounds.maxY);
      }
      return merged;
    }

    function baseA1Type() {
      return { ...presetToSpec(PRESETS.find(preset => preset.code === 'A1')), key: 'internal-a1-base' };
    }

    function geometryForCrossA1Spec(spec) {
      const baseType = { ...baseA1Type(), centreLength: 116, key: 'internal-cross-arm-116' };
      const baseGeom = getGeometryBySpec(baseType);
      const halfLength = baseType.centreLength / 2;
      const components = [
        { tx: -halfLength, ty: 0, rotation: 0, idSuffix: 'h' },
        { tx: 0, ty: -halfLength, rotation: 90, idSuffix: 'v' }
      ];
      const connectorPoints = [];
      const boundsList = [];
      for (const component of components) {
        boundsList.push(transformBounds(baseGeom.thumbBounds, component.tx, component.ty, component.rotation));
        for (const connector of baseGeom.connectorPoints) {
          connectorPoints.push({
            kind: connector.kind,
            local: transformLocalPoint(connector.local, component.tx, component.ty, component.rotation),
            direction: rotatePoint(connector.direction, component.rotation),
            side: connector.side
          });
        }
      }
      return {
        compositeKind: 'crossA1',
        baseType,
        components,
        connectorPoints,
        rotationPivot: { x: 0, y: 0 },
        thumbBounds: mergeBounds(boundsList)
      };
    }

    function cubicPathD(p0, c1, c2, p1) {
      return `M ${p0.x.toFixed(3)} ${p0.y.toFixed(3)} C ${c1.x.toFixed(3)} ${c1.y.toFixed(3)}, ${c2.x.toFixed(3)} ${c2.y.toFixed(3)}, ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`;
    }

    function straightConnectorSample(x, y, side, halfWidth=CONFIG.outerOffset) {
      return {
        p: { x, y },
        t: { x: 1, y: 0 },
        n: { x: 0, y: 1 },
        edgeTop: { x, y: y + halfWidth },
        edgeBottom: { x, y: y - halfWidth }
      };
    }

    function geometryForTripleBranchSpec(spec) {
      const length = spec.centreLength || 144;
      const offsets = [-46, 0, 46];
      const outerHalf = CONFIG.outerOffset;
      const railHalf = CONFIG.railOffset;
      const isOneToThree = spec.compositeKind === 'triple13';

      const bodyPoints = isOneToThree
        ? [
            { x: 0, y: -outerHalf },
            { x: length * 0.28, y: -outerHalf },
            { x: length * 0.70, y: offsets[0] - outerHalf },
            { x: length, y: offsets[0] - outerHalf },
            { x: length, y: offsets[2] + outerHalf },
            { x: length * 0.70, y: offsets[2] + outerHalf },
            { x: length * 0.28, y: outerHalf },
            { x: 0, y: outerHalf }
          ]
        : [
            { x: 0, y: offsets[0] - outerHalf },
            { x: length * 0.30, y: offsets[0] - outerHalf },
            { x: length * 0.72, y: -outerHalf },
            { x: length, y: -outerHalf },
            { x: length, y: outerHalf },
            { x: length * 0.72, y: outerHalf },
            { x: length * 0.30, y: offsets[2] + outerHalf },
            { x: 0, y: offsets[2] + outerHalf }
          ];

      const centrePaths = [];
      const railPaths = [];
      const connectorsGeom = [];

      const addBranchPaths = (startY, endY) => {
        centrePaths.push(cubicPathD(
          { x: 0, y: startY },
          { x: length * 0.30, y: startY },
          { x: length * 0.70, y: endY },
          { x: length, y: endY }
        ));
        for (const delta of [-railHalf, railHalf]) {
          railPaths.push(cubicPathD(
            { x: 0, y: startY + delta },
            { x: length * 0.30, y: startY + delta },
            { x: length * 0.70, y: endY + delta },
            { x: length, y: endY + delta }
          ));
        }
      };

      if (isOneToThree) {
        for (const offset of offsets) addBranchPaths(0, offset);
        connectorsGeom.push(connectorGeometryAtEnd(straightConnectorSample(0, 0, 'start', outerHalf), 'start', spec.startConnector));
        for (const offset of offsets) connectorsGeom.push(connectorGeometryAtEnd(straightConnectorSample(length, offset, 'end', outerHalf), 'end', spec.endConnector));
      } else {
        for (const offset of offsets) addBranchPaths(offset, 0);
        for (const offset of offsets) connectorsGeom.push(connectorGeometryAtEnd(straightConnectorSample(0, offset, 'start', outerHalf), 'start', spec.startConnector));
        connectorsGeom.push(connectorGeometryAtEnd(straightConnectorSample(length, 0, 'end', outerHalf), 'end', spec.endConnector));
      }

      const thumbBounds = boundsFromPoints(bodyPoints);
      for (const connector of connectorsGeom) {
        for (const p of connector.boundsPoints) {
          thumbBounds.minX = Math.min(thumbBounds.minX, p.x);
          thumbBounds.minY = Math.min(thumbBounds.minY, p.y);
          thumbBounds.maxX = Math.max(thumbBounds.maxX, p.x);
          thumbBounds.maxY = Math.max(thumbBounds.maxY, p.y);
        }
        if (connector.kind === 'male' && connector.headRadius > 0) expandBoundsWithCircle(thumbBounds, connector.centre, connector.headRadius);
      }

      return {
        compositeKind: spec.compositeKind,
        bodyPolygonD: polygonD(bodyPoints),
        hitPath: polygonD(bodyPoints),
        railPaths,
        centrePaths,
        connectorsGeom,
        connectorPoints: connectorsGeom.map(connector => ({ kind: connector.kind, local: connector.centre, direction: connector.direction, side: connector.side })),
        rotationPivot: { x: length / 2, y: 0 },
        thumbBounds
      };
    }

    function connectorFillMarkup(paths) {
      return paths.map(d => `<path d="${d}" fill="var(--piece-fill)" stroke="none"></path>`).join('');
    }

    function connectorHitMarkup(paths) {
      return paths.map(d => `<path d="${d}" class="hit" fill="rgba(0,0,0,0.001)" stroke="none"></path>`).join('');
    }

    function connectorOutlineMarkup(connector, edgeColor='var(--edge)') {
      const paths = connector.outlinePaths.map(d => `<path d="${d}" fill="none" stroke="${edgeColor}" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('');
      const shoulders = connector.shoulderD ? `<path d="${connector.shoulderD}" fill="none" stroke="${edgeColor}" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>` : '';
      return paths + shoulders;
    }

    function femaleDefsMarkup(maskId, clipBase, connector) {
      const cutoutClipId = `${clipBase}-cutout`;
      const holeMaskId = `${clipBase}-hole-mask`;
      const throatMaskId = `${clipBase}-throat-mask`;
      return {
        cutoutClipId,
        holeMaskId,
        throatMaskId,
        markup:
          `<clipPath id="${cutoutClipId}" clipPathUnits="userSpaceOnUse">${connector.maskPaths.map(d => `<path d="${d}"></path>`).join('')}</clipPath>` +
          `<mask id="${holeMaskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse"><rect x="-10000" y="-10000" width="20000" height="20000" fill="white"></rect>${connector.maskPaths[1] ? `<path d="${connector.maskPaths[1]}" fill="black"></path>` : ''}</mask>` +
          `<mask id="${throatMaskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse"><rect x="-10000" y="-10000" width="20000" height="20000" fill="white"></rect>${connector.maskPaths[0] ? `<path d="${connector.maskPaths[0]}" fill="black"></path>` : ''}</mask>`
      };
    }


    function femaleTrackMaskMarkup(maskId, connectors) {
      const cutoutPaths = connectors.flatMap(connector => connector.kind === 'female' ? connector.maskPaths : []);
      if (!cutoutPaths.length) return '';
      return `<defs><mask id="${maskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse"><rect x="-10000" y="-10000" width="20000" height="20000" fill="white"></rect>${cutoutPaths.map(d => `<path d="${d}" fill="black"></path>`).join('')}</mask></defs>`;
    }

    function hashString(value) {
      let hash = 2166136261 >>> 0;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function woodRand(seed, index) {
      let x = (seed + Math.imul(index + 1, 374761393)) >>> 0;
      x ^= x >>> 13;
      x = Math.imul(x, 1274126177) >>> 0;
      x ^= x >>> 16;
      return (x >>> 0) / 4294967295;
    }

    function perpendicular(v) {
      return { x: -v.y, y: v.x };
    }

    function offsetPoint(point, vector, amount) {
      return { x: point.x + vector.x * amount, y: point.y + vector.y * amount };
    }

    function addPoints(a, b) {
      return { x: a.x + b.x, y: a.y + b.y };
    }

    function scaleVector(vector, amount) {
      return { x: vector.x * amount, y: vector.y * amount };
    }

    function inwardDirection(connector) {
      return connector.side === 'start'
        ? normalizeVector({ x: -connector.direction.x, y: -connector.direction.y })
        : normalizeVector(connector.direction);
    }

    function buildWoodGuides(geom) {
      const connectors = geom.connectorPoints || [];
      const starts = connectors.filter(connector => connector.side === 'start');
      const ends = connectors.filter(connector => connector.side === 'end');
      if (!starts.length || !ends.length) return [];
      if (starts.length === 1 && ends.length === 1) return [{ start: starts[0], end: ends[0] }];
      if (starts.length === 1) return ends.map(end => ({ start: starts[0], end }));
      if (ends.length === 1) return starts.map(start => ({ start, end: ends[0] }));
      const count = Math.min(starts.length, ends.length);
      return Array.from({ length: count }, (_, i) => ({ start: starts[i], end: ends[i] }));
    }

    function buildWoodTextureMarkup(geom, maskId, idBase) {
      const seed = hashString(String(idBase || geom.code || 'wood'));
      const guides = buildWoodGuides(geom);
      const darkLines = [];
      const lightLines = [];
      if (!guides.length) return '';

      guides.forEach((guide, guideIndex) => {
        const p0 = guide.start.local;
        const p1 = guide.end.local;
        const t0 = inwardDirection(guide.start);
        const t1 = inwardDirection(guide.end);
        const n0 = perpendicular(t0);
        const n1 = perpendicular(t1);
        const span = Math.max(20, distance(p0, p1));
        const laneSpread = CONFIG.outerOffset * (geom.compositeKind ? 0.58 : 0.72);
        const laneCount = Math.max(8, Math.min(16, Math.round(laneSpread * 0.56 + span / 32)));

        for (let laneIndex = 0; laneIndex < laneCount; laneIndex += 1) {
          const idx = guideIndex * 100 + laneIndex * 10;
          const laneT = laneCount === 1 ? 0.5 : laneIndex / (laneCount - 1);
          const offsetBase = (laneT - 0.5) * laneSpread * 2.0;
          const offsetJitterA = (woodRand(seed, idx + 1) - 0.5) * 2.2;
          const offsetJitterB = (woodRand(seed, idx + 2) - 0.5) * 2.4;
          const bendA = (woodRand(seed, idx + 3) - 0.5) * Math.min(9, span * 0.05);
          const bendB = (woodRand(seed, idx + 4) - 0.5) * Math.min(10, span * 0.055);
          const leadA = span * (0.19 + woodRand(seed, idx + 5) * 0.18);
          const leadB = span * (0.20 + woodRand(seed, idx + 6) * 0.20);
          const startPoint = offsetPoint(p0, n0, offsetBase + offsetJitterA);
          const endPoint = offsetPoint(p1, n1, offsetBase + offsetJitterB);
          const c1 = addPoints(addPoints(startPoint, scaleVector(t0, leadA)), scaleVector(n0, bendA));
          const c2 = addPoints(addPoints(endPoint, scaleVector(t1, -leadB)), scaleVector(n1, bendB));
          const pathD = cubicPathD(startPoint, c1, c2, endPoint);
          darkLines.push(`<path d="${pathD}" fill="none" stroke="#7a5230" stroke-width="${(0.38 + woodRand(seed, idx + 7) * 0.42).toFixed(3)}" stroke-linecap="round" opacity="${(0.08 + woodRand(seed, idx + 8) * 0.10).toFixed(3)}"></path>`);
          if (laneIndex < laneCount - 1 || guideIndex % 2 === 0) {
            const lightOffsetA = offsetBase + (woodRand(seed, idx + 9) - 0.5) * 1.8 + laneSpread / Math.max(3, laneCount);
            const lightOffsetB = offsetBase + (woodRand(seed, idx + 10) - 0.5) * 1.8 + laneSpread / Math.max(3, laneCount);
            const lightStart = offsetPoint(p0, n0, lightOffsetA);
            const lightEnd = offsetPoint(p1, n1, lightOffsetB);
            const lightC1 = addPoints(addPoints(lightStart, scaleVector(t0, leadA * (0.88 + woodRand(seed, idx + 11) * 0.18))), scaleVector(n0, bendA * 0.55));
            const lightC2 = addPoints(addPoints(lightEnd, scaleVector(t1, -leadB * (0.88 + woodRand(seed, idx + 12) * 0.18))), scaleVector(n1, bendB * 0.55));
            lightLines.push(`<path d="${cubicPathD(lightStart, lightC1, lightC2, lightEnd)}" fill="none" stroke="#f1ddba" stroke-width="${(0.24 + woodRand(seed, idx + 13) * 0.20).toFixed(3)}" stroke-linecap="round" opacity="${(0.04 + woodRand(seed, idx + 14) * 0.05).toFixed(3)}"></path>`);
          }
        }
      });

      return `<g mask="url(#${maskId})">${darkLines.join('')}${lightLines.join('')}</g>`;
    }

    function buildTrackOverlayMarkup(type, includeHits=true, idBase='track') {
      const geom = getTypeGeometry(type);
      if (geom.compositeKind === 'crossA1') {
        return geom.components.map(component =>
          `<g transform="translate(${component.tx.toFixed(3)} ${component.ty.toFixed(3)}) rotate(${component.rotation.toFixed(3)})">${buildTrackOverlayMarkup(geom.baseType, includeHits, `${idBase}-${component.idSuffix}`)}</g>`
        ).join('');
      }
      if (geom.compositeKind === 'triple13' || geom.compositeKind === 'triple31') {
        const trackMaskId = `${idBase}-track-mask`;
        const trackDefs = femaleTrackMaskMarkup(trackMaskId, geom.connectorsGeom);
        const railMarkup = geom.railPaths.map(d => `<path d="${d}" fill="none" stroke="var(--rail)" stroke-width="${CONFIG.railWidth}" stroke-linecap="butt" stroke-linejoin="round"></path>`).join('');
        const centreMarkup = geom.centrePaths.map(d => `<path d="${d}" fill="none" stroke="var(--centre)" stroke-width="${CONFIG.centreWidth}" stroke-linecap="round" stroke-linejoin="round"></path>`).join('');
        let markup = '';
        if (includeHits) {
          markup += `<path d="${geom.hitPath}" class="hit" fill="rgba(0,0,0,0.001)" stroke="none"></path>` + geom.connectorsGeom.map(connector => connectorHitMarkup(connector.hitPaths)).join('');
        }
        if (trackDefs) markup += trackDefs + `<g mask="url(#${trackMaskId})">${railMarkup}${centreMarkup}</g>`;
        else markup += railMarkup + centreMarkup;
        return markup;
      }
      const trackMaskId = `${idBase}-track-mask`;
      const connectors = [geom.startGeom, geom.endGeom];
      const trackDefs = femaleTrackMaskMarkup(trackMaskId, connectors);
      const overlayMarkup =
        `<path d="${geom.railLeftD}" fill="none" stroke="var(--rail)" stroke-width="${CONFIG.railWidth}" stroke-linecap="butt" stroke-linejoin="round"></path>` +
        `<path d="${geom.railRightD}" fill="none" stroke="var(--rail)" stroke-width="${CONFIG.railWidth}" stroke-linecap="butt" stroke-linejoin="round"></path>` +
        `<path d="${geom.centreD}" fill="none" stroke="var(--centre)" stroke-width="${CONFIG.centreWidth}" stroke-linecap="round" stroke-linejoin="round"></path>`;
      let markup = '';
      if (includeHits) {
        markup += `<path d="${geom.hitPath}" class="hit" fill="rgba(0,0,0,0.001)" stroke="none"></path>` + connectorHitMarkup(geom.startGeom.hitPaths) + connectorHitMarkup(geom.endGeom.hitPaths);
      }
      if (trackDefs) markup += trackDefs + `<g mask="url(#${trackMaskId})">${overlayMarkup}</g>`;
      else markup += overlayMarkup;
      return markup;
    }

    function buildPieceMarkup(type, idBase, includeHits, coverageRect=null) {
      const geom = getTypeGeometry(type);
      const isThumbnail = !includeHits && !!coverageRect;
      const fillCoverage = coverageRect || { x: -10000, y: -10000, width: 20000, height: 20000 };
      const coverageRectWhite = `<rect x="${fillCoverage.x.toFixed(3)}" y="${fillCoverage.y.toFixed(3)}" width="${fillCoverage.width.toFixed(3)}" height="${fillCoverage.height.toFixed(3)}" fill="white"></rect>`;
      const coverageRectBlack = `<rect x="${fillCoverage.x.toFixed(3)}" y="${fillCoverage.y.toFixed(3)}" width="${fillCoverage.width.toFixed(3)}" height="${fillCoverage.height.toFixed(3)}" fill="black"></rect>`;
      const coverageRectFill = `<rect x="${fillCoverage.x.toFixed(3)}" y="${fillCoverage.y.toFixed(3)}" width="${fillCoverage.width.toFixed(3)}" height="${fillCoverage.height.toFixed(3)}" fill="var(--piece-fill)" mask="url(#${idBase}-fill-mask)"></rect>`;
      const woodTextureOverlay = isThumbnail ? '' : buildWoodTextureMarkup(geom, `${idBase}-fill-mask`, idBase);
      if (geom.compositeKind === 'crossA1') {
        return geom.components.map(component =>
          `<g transform="translate(${component.tx.toFixed(3)} ${component.ty.toFixed(3)}) rotate(${component.rotation.toFixed(3)})">${buildPieceMarkup(geom.baseType, `${idBase}-${component.idSuffix}`, false, coverageRect)}</g>`
        ).join('');
      }
      if (geom.compositeKind === 'triple13' || geom.compositeKind === 'triple31') {
        const maskId = `${idBase}-piece-mask`;
        const fillMaskId = `${idBase}-fill-mask`;
        const femaleUi = [];
        let extraDefs = '';
        for (const connector of geom.connectorsGeom) {
          if (connector.kind !== 'female') continue;
          const ids = femaleDefsMarkup(maskId, `${idBase}-${connector.side}-${femaleUi.length}`, connector);
          extraDefs += ids.markup;
          femaleUi.push({ connector, ids });
        }
        const thumbnailFillD = [
          geom.bodyPolygonD,
          ...geom.connectorsGeom.flatMap(connector => connector.fillPaths),
          ...geom.connectorsGeom.flatMap(connector => connector.maskPaths)
        ].join(' ');
        let markup = '<defs>' +
          `<mask id="${maskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse">${coverageRectWhite}${geom.connectorsGeom.flatMap(connector => connector.maskPaths).map(d => `<path d="${d}" fill="black"></path>`).join('')}</mask>` +
          (isThumbnail ? '' : `<mask id="${fillMaskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse">${coverageRectBlack}<path d="${geom.bodyPolygonD}" fill="white" stroke="white" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>${geom.connectorsGeom.flatMap(connector => connector.fillPaths).map(d => `<path d="${d}" fill="white" stroke="white" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('')}${geom.connectorsGeom.flatMap(connector => connector.maskPaths).map(d => `<path d="${d}" fill="black" stroke="black" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('')}</mask>`) +
          extraDefs +
          '</defs>' +
          (isThumbnail
            ? `<path d="${thumbnailFillD}" fill="var(--piece-fill)" fill-rule="evenodd" stroke="none"></path>`
            : `${coverageRectFill}${woodTextureOverlay}`) +
          `<path d="${geom.bodyPolygonD}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth}" stroke-linecap="round" stroke-linejoin="round"></path>` +
          '<g>' + geom.connectorsGeom.map(connector => connectorOutlineMarkup(connector)).join('');
        for (const connector of geom.connectorsGeom) {
          if (connector.capD) markup += `<path d="${connector.capD}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth}" stroke-linecap="round" mask="url(#${maskId})"></path>`;
        }
        for (const { connector, ids } of femaleUi) {
          if (connector.maskPaths[0]) markup += `<path d="${connector.maskPaths[0]}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth * 2}" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#${ids.cutoutClipId})" mask="url(#${ids.holeMaskId})"></path>`;
          if (connector.maskPaths[1]) markup += `<path d="${connector.maskPaths[1]}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth * 2}" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#${ids.cutoutClipId})" mask="url(#${ids.throatMaskId})"></path>`;
        }
        markup += '</g>';
        if (includeHits) {
          markup += `<path d="${geom.hitPath}" class="hit" fill="rgba(0,0,0,0.001)" stroke="none"></path>` + geom.connectorsGeom.map(connector => connectorHitMarkup(connector.hitPaths)).join('');
        }
        return markup;
      }
      const maskId = `${idBase}-piece-mask`;
      const fillMaskId = `${idBase}-fill-mask`;
      const femaleUi = [];
      let extraDefs = '';
      for (const connector of [geom.startGeom, geom.endGeom]) {
        if (connector.kind !== 'female') continue;
        const ids = femaleDefsMarkup(maskId, `${idBase}-${connector.side}`, connector);
        extraDefs += ids.markup;
        femaleUi.push({ connector, ids });
      }

      const thumbnailFillD = [
        geom.bodyPolygonD,
        ...geom.startGeom.fillPaths,
        ...geom.endGeom.fillPaths,
        ...geom.startGeom.maskPaths,
        ...geom.endGeom.maskPaths
      ].join(' ');
      let markup = '<defs>' +
        `<mask id="${maskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse">${coverageRectWhite}${[...geom.startGeom.maskPaths, ...geom.endGeom.maskPaths].map(d => `<path d="${d}" fill="black"></path>`).join('')}</mask>` +
        (isThumbnail ? '' : `<mask id="${fillMaskId}" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse">${coverageRectBlack}<path d="${geom.bodyPolygonD}" fill="white" stroke="white" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>${geom.startGeom.fillPaths.map(d => `<path d="${d}" fill="white" stroke="white" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('')}${geom.endGeom.fillPaths.map(d => `<path d="${d}" fill="white" stroke="white" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('')}${[...geom.startGeom.maskPaths, ...geom.endGeom.maskPaths].map(d => `<path d="${d}" fill="black" stroke="black" stroke-width="${CONFIG.outerWidth}" stroke-linejoin="round" stroke-linecap="round"></path>`).join('')}</mask>`) +
        extraDefs +
        '</defs>' +
        (isThumbnail
          ? `<path d="${thumbnailFillD}" fill="var(--piece-fill)" fill-rule="evenodd" stroke="none"></path>`
          : `${coverageRectFill}${woodTextureOverlay}`) +
        `<path d="${geom.edgeLeftD}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth}" stroke-linecap="round" stroke-linejoin="round"></path>` +
        `<path d="${geom.edgeRightD}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth}" stroke-linecap="round" stroke-linejoin="round"></path>` +
        '<g>' + connectorOutlineMarkup(geom.startGeom) + connectorOutlineMarkup(geom.endGeom);

      for (const connector of [geom.startGeom, geom.endGeom]) {
        if (connector.capD) markup += `<path d="${connector.capD}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth}" stroke-linecap="round" mask="url(#${maskId})"></path>`;
      }
      for (const { connector, ids } of femaleUi) {
        if (connector.maskPaths[0]) markup += `<path d="${connector.maskPaths[0]}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth * 2}" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#${ids.cutoutClipId})" mask="url(#${ids.holeMaskId})"></path>`;
        if (connector.maskPaths[1]) markup += `<path d="${connector.maskPaths[1]}" fill="none" stroke="var(--edge)" stroke-width="${CONFIG.outerWidth * 2}" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#${ids.cutoutClipId})" mask="url(#${ids.throatMaskId})"></path>`;
      }
      markup += '</g>';

      if (includeHits) {
        markup += `<path d="${geom.hitPath}" class="hit" fill="rgba(0,0,0,0.001)" stroke="none"></path>` + connectorHitMarkup(geom.startGeom.hitPaths) + connectorHitMarkup(geom.endGeom.hitPaths);
      }
      return markup;
    }

    function svgUiPoint(clientX, clientY) {
      return svgPoint(clientX, clientY);
    }

    function worldPointFromClient(clientX, clientY) {
      const p = svgUiPoint(clientX, clientY);
      return {
        x: (p.x - state.view.panX) / state.view.zoom,
        y: (p.y - state.view.panY) / state.view.zoom
      };
    }

    function renderViewTransform() {
      const transform = `translate(${state.view.panX.toFixed(3)} ${state.view.panY.toFixed(3)}) scale(${state.view.zoom.toFixed(5)})`;
      if (dom.worldLayer) dom.worldLayer.setAttribute('transform', transform);
    }

    function trashMarkup(active=false) {
      const iconStroke = active ? '#8b1e12' : '#b42318';
      return `
        <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <path d="M22 12h20l2 6h10v4H10v-4h10l2-6zm3 0-1.3 4h16.6L39 12H25zm-6 14h26l-2.8 26a6 6 0 0 1-6 5.4H27.8a6 6 0 0 1-6-5.4L19 26zm8 6v16m10-16v16" fill="none" stroke="${iconStroke}" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>`;
    }

    function renderTrashDrop() {
      if (!dom.trashOverlay) return;
      dom.trashOverlay.innerHTML = trashMarkup(state.dragOverTrash);
      dom.trashOverlay.classList.toggle('active', state.dragOverTrash);
    }

    function isClientPointOverTrash(clientX, clientY) {
      if (!dom.trashOverlay) return false;
      const rect = dom.trashOverlay.getBoundingClientRect();
      return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
    }

    function queueWarningsUpdate() {
      if (state.warningsQueued) return;
      state.warningsQueued = true;
      requestAnimationFrame(() => {
        state.warningsQueued = false;
        updateConnectionWarnings();
      });
    }

    function updatePieceTransform(piece) {
      const pivot = pieceLocalPivot(piece);
      const transform = `translate(${piece.x.toFixed(3)} ${piece.y.toFixed(3)}) rotate(${piece.rotation.toFixed(3)}) translate(${-pivot.x.toFixed(3)} ${-pivot.y.toFixed(3)})`;
      piece.el.setAttribute('transform', transform);
      if (piece.overlayEl) piece.overlayEl.setAttribute('transform', transform);
      piece.el.style.display = piece.visible ? '' : 'none';
      if (piece.overlayEl) piece.overlayEl.style.display = piece.visible ? '' : 'none';
      piece.el.classList.toggle('is-active', piece.id === state.activePieceId);
      if (piece.overlayEl) piece.overlayEl.classList.toggle('is-active', piece.id === state.activePieceId);
      queueWarningsUpdate();
    }

    function renderPiece(piece) {
      const geom = getTypeGeometry(piece.type);
      piece.connectors = geom.connectorPoints;
      piece.rotationPivot = geom.rotationPivot || { x: 0, y: 0 };
      piece.renderVersion = (piece.renderVersion || 0) + 1;
      piece.el.innerHTML = buildPieceMarkup(piece.type, `piece-${piece.id}-${piece.renderVersion}`, true);
      if (piece.overlayEl) piece.overlayEl.innerHTML = buildTrackOverlayMarkup(piece.type, true, `piece-track-${piece.id}`);
      updatePieceTransform(piece);
    }

    function selectPiece(piece) {
      if (!piece) return;
      state.activePieceId = piece.id;
      dom.pieceLayer.appendChild(piece.el);
      if (piece.overlayEl) dom.trackOverlayLayer.appendChild(piece.overlayEl);
      for (const other of pieceValues()) other.el.classList.toggle('is-active', other.id === piece.id);
      renderLegend();
    }

    function movePieceToType(piece, nextSpec) {
      const oldType = piece.type;
      oldType.pieces = oldType.pieces.filter(p => p.id !== piece.id);
      if (!oldType.pieces.length) state.pieceTypes.delete(oldType.key);
      const nextType = ensureType(nextSpec);
      nextType.pieces.push(piece);
      piece.type = nextType;
      piece.isStraight = nextType.isStraight;
      piece.angleDeg = nextType.angleDeg;
      piece.radiusValue = nextType.radiusValue;
      piece.centreLength = nextType.centreLength;
      piece.startConnector = nextType.startConnector;
      piece.endConnector = nextType.endConnector;
      piece.presetCode = nextType.presetCode;
      piece.notes = nextType.notes;
      piece.compositeKind = nextType.compositeKind;
      return nextType;
    }

    function createPiece(type, options={}) {
      const geom = getTypeGeometry(type);
      const spawnOriginX = options.x ?? CONFIG.newPieceOrigin.x + type.pieces.length * CONFIG.spawnStep.x;
      const spawnOriginY = options.y ?? CONFIG.newPieceOrigin.y + type.pieces.length * CONFIG.spawnStep.y;
      const pivot = geom.rotationPivot || { x: 0, y: 0 };
      const piece = {
        id: ++state.pieceCounter,
        type,
        isStraight: type.isStraight,
        angleDeg: type.angleDeg,
        radiusValue: type.radiusValue,
        centreLength: type.centreLength,
        startConnector: type.startConnector,
        endConnector: type.endConnector,
        presetCode: type.presetCode,
        notes: type.notes,
        compositeKind: type.compositeKind,
        visible: options.visible ?? true,
        x: spawnOriginX + pivot.x,
        y: spawnOriginY + pivot.y,
        rotation: options.rotation ?? 0,
        renderVersion: 0,
        connectors: [],
        rotationPivot: pivot,
        label: type.presetCode ? `${type.presetCode} ${state.pieceCounter}` : `Piece ${state.pieceCounter}`
      };
      piece.el = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      piece.el.classList.add('piece');
      piece.el.dataset.pieceId = String(piece.id);
      piece.overlayEl = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      piece.overlayEl.classList.add('piece-overlay');
      piece.overlayEl.dataset.pieceId = String(piece.id);
      type.pieces.push(piece);
      state.pieces.set(piece.id, piece);
      dom.pieceLayer.appendChild(piece.el);
      dom.trackOverlayLayer.appendChild(piece.overlayEl);
      renderPiece(piece);
      selectPiece(piece);
      return piece;
    }

    function deletePiece(pieceId) {
      const piece = state.pieces.get(pieceId);
      if (!piece) return;
      if (state.activePieceId === pieceId) state.activePieceId = null;
      piece.type.pieces = piece.type.pieces.filter(p => p.id !== pieceId);
      if (!piece.type.pieces.length) state.pieceTypes.delete(piece.type.key);
      state.pieces.delete(pieceId);
      piece.el.remove();
      if (piece.overlayEl) piece.overlayEl.remove();
      renderLegend();
      queueWarningsUpdate();
    }

    function rotatePiece(piece, direction=1) {
      if (!piece) return;
      const step = 45;
      piece.rotation += step * direction;
      updatePieceTransform(piece);
      renderLegend();
    }

    function flipPieceAngle(piece) {
      if (!piece || piece.compositeKind || piece.isStraight || Math.abs(piece.angleDeg) < 1e-9) return;
      const nextSpec = buildSpec({
        centreLength: piece.centreLength,
        angleDeg: -piece.angleDeg,
        radiusValue: piece.radiusValue,
        startConnector: piece.startConnector,
        endConnector: piece.endConnector,
        presetCode: piece.presetCode,
        notes: piece.notes
      });
      movePieceToType(piece, nextSpec);
      renderPiece(piece);
      renderLegend();
    }

    function buildSnapMatches(piece) {
      const matches = [];
      for (let ownIndex = 0; ownIndex < piece.connectors.length; ownIndex++) {
        const own = piece.connectors[ownIndex];
        const ownWorld = worldConnectorPoint(piece, own.local);
        const ownDir = worldDirection(piece, own.direction);
        for (const other of pieceValues()) {
          if (other.id === piece.id || !other.visible) continue;
          for (let targetIndex = 0; targetIndex < other.connectors.length; targetIndex++) {
            const target = other.connectors[targetIndex];
            if (own.kind === target.kind) continue;
            const targetDir = worldDirection(other, target.direction);
            if (!areConnectorDirectionsAligned(ownDir, targetDir)) continue;
            const targetWorld = worldConnectorPoint(other, target.local);
            const offset = { x: targetWorld.x - ownWorld.x, y: targetWorld.y - ownWorld.y };
            const d = Math.hypot(offset.x, offset.y);
            if (d > CONFIG.snapDistance) continue;
            matches.push({
              ownIndex,
              ownLocal: own.local,
              targetPieceId: other.id,
              targetIndex,
              targetWorld,
              offset,
              distance: d
            });
          }
        }
      }
      return matches;
    }

    function findSnapCandidate(piece) {
      const matches = buildSnapMatches(piece);
      let bestDouble = null;
      for (let i = 0; i < matches.length; i++) {
        const a = matches[i];
        for (let j = i + 1; j < matches.length; j++) {
          const b = matches[j];
          if (a.ownIndex === b.ownIndex) continue;
          if (a.targetPieceId === b.targetPieceId && a.targetIndex === b.targetIndex) continue;
          const offset = {
            x: (a.offset.x + b.offset.x) / 2,
            y: (a.offset.y + b.offset.y) / 2
          };
          const residualA = Math.hypot(offset.x - a.offset.x, offset.y - a.offset.y);
          const residualB = Math.hypot(offset.x - b.offset.x, offset.y - b.offset.y);
          const maxResidual = Math.max(residualA, residualB);
          if (maxResidual > CONFIG.dualSnapMaxResidual) continue;
          const score = maxResidual * 4 + (residualA + residualB) + Math.hypot(offset.x, offset.y) * 0.05;
          if (!bestDouble || score < bestDouble.score) {
            bestDouble = { kind: 'double', offset, score };
          }
        }
      }
      if (bestDouble) return bestDouble;
      let bestSingle = null;
      for (const match of matches) {
        if (!bestSingle || match.distance < bestSingle.distance) {
          bestSingle = { kind: 'single', offset: match.offset, distance: match.distance };
        }
      }
      return bestSingle;
    }

    function connectorSlotKey(pieceId, connectorIndex) {
      return `${pieceId}:${connectorIndex}`;
    }

    function clampVectorMagnitude(vector, maxMagnitude) {
      const magnitude = Math.hypot(vector.x, vector.y);
      if (!magnitude || magnitude <= maxMagnitude) return vector;
      const scale = maxMagnitude / magnitude;
      return { x: vector.x * scale, y: vector.y * scale };
    }

    function buildMutualAlignmentLinks(maxDistance=CONFIG.seriesRelaxDistance) {
      const visiblePieces = pieceValues().filter(piece => piece.visible);
      const bestByConnector = new Map();
      for (const piece of visiblePieces) {
        for (let ownIndex = 0; ownIndex < piece.connectors.length; ownIndex++) {
          const own = piece.connectors[ownIndex];
          const ownWorld = worldConnectorPoint(piece, own.local);
          const ownDir = worldDirection(piece, own.direction);
          let best = null;
          for (const other of visiblePieces) {
            if (other.id === piece.id) continue;
            for (let targetIndex = 0; targetIndex < other.connectors.length; targetIndex++) {
              const target = other.connectors[targetIndex];
              if (own.kind === target.kind) continue;
              const targetDir = worldDirection(other, target.direction);
              if (!areConnectorDirectionsAligned(ownDir, targetDir)) continue;
              const targetWorld = worldConnectorPoint(other, target.local);
              const d = distance(ownWorld, targetWorld);
              if (d > maxDistance) continue;
              if (!best || d < best.distance) {
                best = {
                  pieceId: piece.id,
                  connectorIndex: ownIndex,
                  otherPieceId: other.id,
                  otherConnectorIndex: targetIndex,
                  distance: d
                };
              }
            }
          }
          if (best) bestByConnector.set(connectorSlotKey(piece.id, ownIndex), best);
        }
      }
      const links = [];
      const seen = new Set();
      for (const best of bestByConnector.values()) {
        const reverse = bestByConnector.get(connectorSlotKey(best.otherPieceId, best.otherConnectorIndex));
        if (!reverse) continue;
        if (reverse.otherPieceId !== best.pieceId || reverse.otherConnectorIndex !== best.connectorIndex) continue;
        const key = [connectorSlotKey(best.pieceId, best.connectorIndex), connectorSlotKey(best.otherPieceId, best.otherConnectorIndex)].sort().join('|');
        if (seen.has(key)) continue;
        seen.add(key);
        links.push({
          aPieceId: best.pieceId,
          aIndex: best.connectorIndex,
          bPieceId: best.otherPieceId,
          bIndex: best.otherConnectorIndex
        });
      }
      return links;
    }

    function buildLinkedPieceComponent(seedPieceId, links) {
      const adjacency = new Map();
      for (const link of links) {
        if (!adjacency.has(link.aPieceId)) adjacency.set(link.aPieceId, new Set());
        if (!adjacency.has(link.bPieceId)) adjacency.set(link.bPieceId, new Set());
        adjacency.get(link.aPieceId).add(link.bPieceId);
        adjacency.get(link.bPieceId).add(link.aPieceId);
      }
      const component = new Set([seedPieceId]);
      const queue = [seedPieceId];
      while (queue.length) {
        const pieceId = queue.shift();
        const neighbours = adjacency.get(pieceId);
        if (!neighbours) continue;
        for (const neighbourId of neighbours) {
          if (component.has(neighbourId)) continue;
          component.add(neighbourId);
          queue.push(neighbourId);
        }
      }
      return component;
    }

    function relaxConnectedSeries(seedPieceId) {
      const links = buildMutualAlignmentLinks(CONFIG.seriesRelaxDistance);
      if (!links.length) return false;
      const component = buildLinkedPieceComponent(seedPieceId, links);
      if (component.size < 2) return false;
      const componentLinks = links.filter(link => component.has(link.aPieceId) && component.has(link.bPieceId));
      if (!componentLinks.length) return false;
      let moved = false;
      for (let iter = 0; iter < CONFIG.seriesRelaxIterations; iter++) {
        const adjustments = new Map();
        for (const pieceId of component) adjustments.set(pieceId, { x: 0, y: 0, count: 0 });
        for (const link of componentLinks) {
          const aPiece = state.pieces.get(link.aPieceId);
          const bPiece = state.pieces.get(link.bPieceId);
          if (!aPiece || !bPiece || !aPiece.visible || !bPiece.visible) continue;
          const aConnector = aPiece.connectors[link.aIndex];
          const bConnector = bPiece.connectors[link.bIndex];
          if (!aConnector || !bConnector) continue;
          const aPoint = worldConnectorPoint(aPiece, aConnector.local);
          const bPoint = worldConnectorPoint(bPiece, bConnector.local);
          const gap = clampVectorMagnitude({ x: bPoint.x - aPoint.x, y: bPoint.y - aPoint.y }, CONFIG.seriesRelaxMaxPerPass);
          const aAdjust = adjustments.get(aPiece.id);
          const bAdjust = adjustments.get(bPiece.id);
          aAdjust.x += gap.x * 0.5;
          aAdjust.y += gap.y * 0.5;
          aAdjust.count += 1;
          bAdjust.x -= gap.x * 0.5;
          bAdjust.y -= gap.y * 0.5;
          bAdjust.count += 1;
        }
        const proposedSteps = [];
        for (const pieceId of component) {
          const adjust = adjustments.get(pieceId);
          if (!adjust || !adjust.count) continue;
          proposedSteps.push({
            pieceId,
            x: (adjust.x / adjust.count) * CONFIG.seriesRelaxStep,
            y: (adjust.y / adjust.count) * CONFIG.seriesRelaxStep
          });
        }
        if (!proposedSteps.length) break;
        const meanStep = proposedSteps.reduce((acc, step) => ({ x: acc.x + step.x, y: acc.y + step.y }), { x: 0, y: 0 });
        meanStep.x /= proposedSteps.length;
        meanStep.y /= proposedSteps.length;
        let maxStep = 0;
        for (const step of proposedSteps) {
          const piece = state.pieces.get(step.pieceId);
          if (!piece) continue;
          const dx = step.x - meanStep.x;
          const dy = step.y - meanStep.y;
          piece.x += dx;
          piece.y += dy;
          maxStep = Math.max(maxStep, Math.hypot(dx, dy));
        }
        if (maxStep < 0.01) break;
        moved = true;
      }
      if (!moved) return false;
      for (const pieceId of component) {
        const piece = state.pieces.get(pieceId);
        if (piece) updatePieceTransform(piece);
      }
      return true;
    }

    function snapPiece(piece) {
      const candidate = findSnapCandidate(piece);
      if (!candidate) return false;
      piece.x += candidate.offset.x;
      piece.y += candidate.offset.y;
      updatePieceTransform(piece);
      relaxConnectedSeries(piece.id);
      return true;
    }

    function clearWarnings() {
      dom.fxLayer.textContent = '';
    }

    function drawExplosionMarker(point) {
      const spikes = 10, outer = 11, inner = 5.5;
      let burstPoints = '';
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const a = -Math.PI / 2 + i * Math.PI / spikes;
        burstPoints += `${i ? ' ' : ''}${(Math.cos(a) * r).toFixed(3)},${(Math.sin(a) * r).toFixed(3)}`;
      }
      dom.fxLayer.insertAdjacentHTML('beforeend',
        `<g transform="translate(${point.x.toFixed(3)} ${point.y.toFixed(3)})" pointer-events="none"><polygon points="${burstPoints}" fill="#ffb11b" stroke="#c2410c" stroke-width="1.2"></polygon><circle cx="0" cy="0" r="3.1" fill="#fff4cf"></circle><text x="0" y="1.2" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-weight="900" fill="#7c2d12">!</text></g>`
      );
    }

    function updateConnectionWarnings() {
      clearWarnings();
      const pieces = pieceValues().filter(piece => piece.visible);
      for (let i = 0; i < pieces.length; i++) {
        const aPiece = pieces[i];
        for (let j = i + 1; j < pieces.length; j++) {
          const bPiece = pieces[j];
          for (const a of aPiece.connectors) {
            const aPoint = worldConnectorPoint(aPiece, a.local);
            const aDir = worldDirection(aPiece, a.direction);
            for (const b of bPiece.connectors) {
              if (a.kind === b.kind) continue;
              const bPoint = worldConnectorPoint(bPiece, b.local);
              if (distance(aPoint, bPoint) > CONFIG.connectionEpsilon) continue;
              const bDir = worldDirection(bPiece, b.direction);
              if (!areConnectorDirectionsAligned(aDir, bDir)) drawExplosionMarker({ x: (aPoint.x + bPoint.x) / 2, y: (aPoint.y + bPoint.y) / 2 });
            }
          }
        }
      }
    }

    function buildDisplayName(type) {
      if (type.presetCode) return presetDisplayName(type);
      const baseName = type.isStraight ? 'Straight' : type.radiusMode;
      return `${connectorIcon(type.startConnector)} ${baseName} ${connectorIcon(type.endConnector)}`;
    }

    function sortedTypes() {
      return [...state.pieceTypes.values()].sort((a, b) => {
        const ai = PRESET_INDEX.get(a.presetCode) ?? Number.MAX_SAFE_INTEGER;
        const bi = PRESET_INDEX.get(b.presetCode) ?? Number.MAX_SAFE_INTEGER;
        if (ai !== bi) return ai - bi;
        const ap = a.presetCode || '', bp = b.presetCode || '';
        if (ap !== bp) return ap.localeCompare(bp, undefined, { numeric: true });
        if (a.isStraight !== b.isStraight) return a.isStraight ? -1 : 1;
        return a.isStraight ? a.centreLength - b.centreLength : (a.radiusValue - b.radiusValue) || (a.angleDeg - b.angleDeg);
      });
    }

    function renderLegend() {
      if (!dom.legend) return;
      const types = sortedTypes();
      if (!types.length) {
        dom.legend.innerHTML = '<div class="empty">No pieces yet.</div>';
        return;
      }
      let html = '';
      for (const type of types) {
        const meta = type.isStraight
          ? `L ${fmt(type.centreLength)} · ${type.pieces.length} piece${type.pieces.length === 1 ? '' : 's'}`
          : `L ${fmt(type.centreLength)} · R ${fmt(type.radiusValue)} · ${type.pieces.length} piece${type.pieces.length === 1 ? '' : 's'}`;
        html += `<div class="spec-card"><div class="spec-header"><div class="spec-title"><div class="spec-name">${buildDisplayName(type)}</div><div class="spec-meta">${meta}</div></div><div class="spec-actions"><button class="mini-btn" data-action="add-type" data-type-key="${type.key}">Add another</button><button class="icon-btn${type.expanded ? ' expanded' : ''}" data-action="toggle-type" data-type-key="${type.key}" title="${type.expanded ? 'Collapse list' : 'Expand list'}"><span class="arrow">▾</span></button></div></div><div class="piece-list${type.expanded ? ' expanded' : ''}">`;
        for (const piece of type.pieces) {
          const label = `${piece.label} · rot ${fmt(piece.rotation)}°`;
          html += `<div class="piece-row${piece.id === state.activePieceId ? ' active' : ''}" data-action="select-piece" data-piece-id="${piece.id}"><input class="piece-toggle" type="checkbox" data-action="toggle-visible" data-piece-id="${piece.id}" ${piece.visible ? 'checked' : ''}><div class="piece-label" title="${label}">${label}</div><button class="delete-btn" data-action="delete-piece" data-piece-id="${piece.id}" aria-label="Delete ${piece.label}" title="Delete piece">×</button></div>`;
        }
        html += '</div></div>';
      }
      dom.legend.innerHTML = html;
    }

    function syncPresetActiveState() {
      for (const button of dom.presetButtons.querySelectorAll('.preset-card')) {
        button.classList.toggle('active', button.dataset.code === state.activePresetCode);
      }
    }

    function getThumbFrame() {
      if (state.thumbFrame) return state.thumbFrame;
      let maxWidth = 0, maxHeight = 0;
      for (const preset of PRESETS) {
        const spec = presetToSpec(preset);
        const geom = getGeometryBySpec({ ...spec, key: specKey(spec) });
        maxWidth = Math.max(maxWidth, geom.thumbBounds.maxX - geom.thumbBounds.minX);
        maxHeight = Math.max(maxHeight, geom.thumbBounds.maxY - geom.thumbBounds.minY);
      }
      state.thumbFrame = { pad: 8, viewWidth: maxWidth + 16, viewHeight: maxHeight + 16 };
      return state.thumbFrame;
    }

    function getThumbSvgMarkup(preset) {
      if (state.thumbCache.has(preset.code)) return state.thumbCache.get(preset.code);
      const spec = presetToSpec(preset);
      const type = { ...spec, key: specKey(spec) };
      const geom = getGeometryBySpec(type);
      const frame = getThumbFrame();
      const bounds = geom.thumbBounds;
      const tx = frame.pad + (frame.viewWidth - frame.pad * 2 - (bounds.maxX - bounds.minX)) / 2 - bounds.minX;
      const ty = frame.pad + (frame.viewHeight - frame.pad * 2 - (bounds.maxY - bounds.minY)) / 2 - bounds.minY;
      const thumbCoverage = {
        x: bounds.minX - 20,
        y: bounds.minY - 20,
        width: (bounds.maxX - bounds.minX) + 40,
        height: (bounds.maxY - bounds.minY) + 40
      };
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" class="preset-thumb" viewBox="0 0 ${frame.viewWidth} ${frame.viewHeight}" preserveAspectRatio="xMidYMid meet" aria-hidden="true" focusable="false" style="--piece-fill:#dac09b;--rail:#4b2a17;--edge:#111111;--centre:#f4b35e;"><g transform="translate(${tx.toFixed(3)} ${ty.toFixed(3)})">${buildPieceMarkup(type, `thumb-${preset.code}`, false, thumbCoverage)}</g></svg>`;
      state.thumbCache.set(preset.code, svg);
      return svg;
    }

    function nextPlacementPosition(type) {
      const totalPieces = state.pieces.size;
      const perTypeIndex = type.pieces.length;
      const col = totalPieces % 6;
      const row = Math.floor(totalPieces / 6) % 4;
      return {
        x: CONFIG.newPieceOrigin.x + col * 34 + perTypeIndex * 6,
        y: CONFIG.newPieceOrigin.y + row * 28 + perTypeIndex * 5
      };
    }

    function placePresetPiece(presetCode) {
      const preset = PRESETS.find(item => item.code === presetCode);
      if (!preset) return null;
      const type = ensureType(presetToSpec(preset));
      const pos = nextPlacementPosition(type);
      state.activePresetCode = preset.code;
      syncPresetActiveState();
      return createPiece(type, pos);
    }

    function createPresetPieceAtClient(presetCode, clientX, clientY) {
      const preset = PRESETS.find(item => item.code === presetCode);
      if (!preset) return null;
      const type = ensureType(presetToSpec(preset));
      const pivot = getTypeGeometry(type).rotationPivot || { x: 0, y: 0 };
      const world = worldPointFromClient(clientX, clientY);
      state.activePresetCode = preset.code;
      syncPresetActiveState();
      const piece = createPiece(type, { x: world.x - pivot.x, y: world.y - pivot.y });
      snapPiece(piece);
      return piece;
    }

    function canDropPresetAtClient(clientX, clientY) {
      const workspaceRect = dom.workspace?.getBoundingClientRect?.();
      if (!workspaceRect) return false;
      if (clientX < workspaceRect.left || clientX > workspaceRect.right || clientY < workspaceRect.top || clientY > workspaceRect.bottom) return false;
      const stripRect = dom.presetStrip?.getBoundingClientRect?.();
      if (stripRect && clientX >= stripRect.left && clientX <= stripRect.right && clientY >= stripRect.top && clientY <= stripRect.bottom) return false;
      return true;
    }

    function updateLibraryDragGhost(drag, clientX, clientY) {
      if (!drag?.ghostEl) return;
      drag.ghostEl.style.transform = `translate(${clientX + 14}px, ${clientY + 14}px) rotate(2deg)`;
      drag.ghostEl.classList.toggle('can-drop', canDropPresetAtClient(clientX, clientY));
    }

    function ensureLibraryDragGhost(drag) {
      if (!drag || drag.ghostEl) return;
      const ghost = document.createElement('div');
      ghost.className = 'preset-card preset-drag-ghost';
      ghost.innerHTML = drag.sourceButton.innerHTML;
      document.body.appendChild(ghost);
      drag.ghostEl = ghost;
      drag.sourceButton.classList.add('drag-origin');
      updateLibraryDragGhost(drag, drag.lastClientX, drag.lastClientY);
    }

    function clearLibraryDrag() {
      const drag = state.libraryDrag;
      if (!drag) return;
      drag.sourceButton?.classList?.remove('drag-origin');
